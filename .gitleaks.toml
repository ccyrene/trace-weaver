# Gitleaks configuration — secret scanning policy for TraceWeaver.
# Extends the built-in ruleset; add allowlist entries here instead of
# disabling the scan when a finding is a confirmed false positive.

title = "TraceWeaver secret scanning policy"

[extend]
useDefault = true

[allowlist]
description = "Known-safe placeholders and demo-only credentials"
paths = [
    # Env templates with placeholder values only — never put real secrets here.
    '''\.env\.example$''',
    # CI reports generated by other scanners.
    '''^reports/''',
]
regexes = [
    # Throwaway Postgres credential used only by the demo docker-compose stack
    # and documented quick-start commands (user/password/db are all "lineage").
    '''lineage:lineage''',
    '''POSTGRES_PASSWORD: lineage''',
    # Public OSS repo URL used as a git-URL parsing test fixture.
    '''git@github\.com:apache/airflow\.git''',
]
